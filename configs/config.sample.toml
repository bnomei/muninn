# Muninn sample config. Copy this file to your resolved config path.
# Path precedence: MUNINN_CONFIG -> $XDG_CONFIG_HOME/muninn/config.toml -> ~/.config/muninn/config.toml

[app]
profile = "default"
strict_step_contract = true
autostart = false

[hotkeys.push_to_talk]
trigger = "double_tap"
chord = ["ctrl"]
double_tap_timeout_ms = 300

[hotkeys.done_mode_toggle]
trigger = "press"
chord = ["ctrl", "shift", "d"]

[hotkeys.cancel_current_capture]
trigger = "press"
chord = ["ctrl", "shift", "x"]

[indicator]
show_recording = true
show_processing = true

[indicator.colors]
idle = "#636366"
recording = "#FF9F0A"
transcribing = "#0A84FF"
pipeline = "#BF5AF2"
output = "#30D158"
cancelled = "#FF453A"
outline = "#2C2C2E"
glyph = "#FFFFFF"

[recording]
mono = true
sample_rate_khz = 16

[transcription]
# Local-first ordered provider route from spec 29.
providers = ["apple_speech", "whisper_cpp", "deepgram", "openai", "google"]

[providers.apple_speech]
# Apple-managed local backend for macOS 26+ completed recordings.
# locale = "en-US"
# install_assets defaults to true and lets Muninn trigger the supported Apple asset install flow.
# install_assets = true

[pipeline]
deadline_ms = 40000
payload_format = "json_object"

# STT route legs are resolved from [transcription].providers before the runner starts.
# Keep explicit stt_* steps here only when you intentionally want pipeline-only compatibility.

# Built-in refine step (active)
[[pipeline.steps]]
id = "refine"
cmd = "refine"
timeout_ms = 2500
on_error = "continue"

# External text filter example (optional)
# [[pipeline.steps]]
# id = "uppercase"
# cmd = "/usr/bin/tr"
# args = ["[:lower:]", "[:upper:]"]
# timeout_ms = 250
# on_error = "continue"
#
# External JSON-envelope step (opt-in)
# [[pipeline.steps]]
# id = "json_transform"
# cmd = "/opt/homebrew/bin/jq"
# args = ["-c", ".output.final_text |= ascii_upcase"]
# io_mode = "envelope_json"
# timeout_ms = 250
# on_error = "continue"

[scoring]
min_top_score = 0.84
min_margin = 0.10
acronym_min_top_score = 0.90
acronym_min_margin = 0.15

[transcript]
# Give refine a light voice/style hint.
# Keep it conservative, or tune it to your own editorial style.
system_prompt = "Prefer minimal corrections. Focus on technical terms, developer tools, package names, commands, flags, file names, paths, env vars, acronyms, and obvious dictation errors. If uncertain, keep the original wording."

[refine]
provider = "openai"
endpoint = "https://api.openai.com/v1/chat/completions"
model = "gpt-4.1-mini"
temperature = 0.0
max_output_tokens = 512
max_length_delta_ratio = 0.25
max_token_change_ratio = 0.60
max_new_word_count = 2

# Optional contextual voices and profiles.
# Voice means refine behavior plus an optional one-letter tray glyph, not audio voice.
# Rules are matched top to bottom. Put the most specific rules first.
# Muninn starts from the base config, applies the matched voice, then applies the matched
# profile last so profile-specific overrides win.
#
# [voices.codex]
# indicator_glyph = "C"
# system_prompt = "Prefer terse developer dictation. Keep code tokens, commands, file names, flags, and package names intact."
#
# [voices.terminal]
# indicator_glyph = "T"
# system_prompt = "Preserve shell commands exactly. Prefer minimal punctuation changes."
#
# [voices.mail]
# indicator_glyph = "E"
# system_prompt = "Correct spelling and obvious grammar in the language already being used. Preserve the intended language, names, quoted text, URLs, and code. Do not translate."
#
# [profiles.codex]
# voice = "codex"
#
# [profiles.terminal]
# voice = "terminal"
#
# [profiles.mail]
# voice = "mail"

# Example cloud-focused override for one profile.
# [profiles.mail.transcription]
# providers = ["deepgram", "openai", "google"]
#
# [[profile_rules]]
# id = "codex-app"
# profile = "codex"
# app_name = "Codex"
#
# [[profile_rules]]
# id = "terminal-app"
# profile = "terminal"
# bundle_id = "com.apple.Terminal"
#
# [[profile_rules]]
# id = "alacritty-app"
# profile = "terminal"
# bundle_id = "org.alacritty"
#
# [[profile_rules]]
# id = "mail-app"
# profile = "mail"
# bundle_id_prefix = "com.apple.mail"
#
# [[profile_rules]]
# id = "proton-mail-app"
# profile = "mail"
# bundle_id = "ch.protonmail.desktop"
#
# If no rule matches, Muninn falls back to app.profile for behavior, but the idle
# tray glyph still falls back to the default M until a rule matches.

[logging]
replay_enabled = false
replay_retain_audio = true
replay_dir = "~/.local/state/muninn/replay"
replay_retention_days = 7
replay_max_bytes = 52_428_800

[providers.openai]
# api_key = "set via OPENAI_API_KEY"
endpoint = "https://api.openai.com/v1/audio/transcriptions"
model = "gpt-4o-mini-transcribe"

[providers.whisper_cpp]
# model defaults to "tiny.en", which resolves to ggml-tiny.en.bin under model_dir
# model = "base.en"
model_dir = "~/.local/share/muninn/models"
device = "auto"

[providers.google]
# api_key = "set via GOOGLE_API_KEY"
# token = "set via GOOGLE_STT_TOKEN"
# endpoint can also be overridden with GOOGLE_STT_ENDPOINT
endpoint = "https://speech.googleapis.com/v1/speech:recognize"
# model = "latest_short"
# model can also be overridden with GOOGLE_STT_MODEL
